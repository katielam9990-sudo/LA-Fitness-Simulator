<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Digital Twin Simulator</title>
</head>
<body>

    <h1>Biomedical Metabolic Simulator</h1>
    
    <!-- INPUT MODULE -->
    <div id="input-container">
        <label for="weightInput">Current Weight (kg):</label>
        <input type="number" id="weightInput" value="90"><br><br>

        <label for="bodyFatInput">Estimated Body Fat (%):</label>
        <input type="number" id="bodyFatInput" value="25"><br><br>

        <label for="activityInput">Activity Level:</label>
        <select id="activityInput">
            <option value="1.2">Sedentary (No Exercise)</option>
            <option value="1.375">Lightly Active (1-3 days/wk)</option>
            <option value="1.55" selected>Moderately Active (3-5 days/wk)</option>
            <option value="1.725">Very Active (6-7 days/wk)</option>
        </select><br><br>

        <label for="proteinInput">Daily Protein Intake:</label>
        <select id="proteinInput">
            <option value="Low">Baseline Standard (1.2 g/kg)</option>
            <option value="Moderate" selected>Optimal for Fat Loss/Preventing Muscle Loss (1.6 g/kg)</option>
            <option value="High">High for Muscle Gain (2.0 g/kg)</option>
        </select><br><br>

        <label for="goalInput">Your Fitness Goal:</label>
        <select id="goalInput">
            <option value="0.15" selected>Sustainable Fat Loss (-15% caloric deficit)</option>
            <option value="0.25">Aggressive Fat Loss (-25% caloric deficit)</option>
            <option value="-0.10">Lean Muscle Gain (+10% caloric surplus)</option>
        </select>

        <button onclick="checkInputs()">Run Bio-Simulation</button>
    </div>

    <hr>

    <!-- OUTPUT MODULE -->
    <div id="output-container">

        <div style="display: flex; gap: 40px; align-items: flex-start;">

            <div style="flex: 0.45; min-width: 220px; text-align: center;">
                <h3>Your Baseline Biometrics:</h3>
                <p>Lean Body Mass: <span id="lbmOutput">--</span> kg</p>
                <p>Daily Maintenance Calories (TDEE): <span id="tdeeOutput">--</span> kcal</p>

        
                <div id="phase-roadmap" style="background: #f8f9fa; padding: 10px; text-align: center; border-radius: 8px; margin: 10px 0; display: none;">
                    <h4>📋 Your 12-Week Coaching Calorie Phases:</h4>
                    <p>🥇 <strong>Phase 1 (Weeks 1-4):</strong> <span id="phase1Cal">--</span> kcal/day</p>
                    <p>🥈 <strong>Phase 2 (Weeks 5-8):</strong> <span id="phase2Cal">--</span> kcal/day</p>
                    <p>🥉 <strong>Phase 3 (Weeks 9-12):</strong> <span id="phase3Cal">--</span> kcal/day</p>
                 </div>
            </div>

        <!-- THE GRAPH CONTAINER -->
        <div style="flex: 1.3; max-width: 600px; margin: 20px auto;">
            <canvas id="trajectoryChart"></canvas>
        </div>
    </div>

    <!-- Chart.js engine framework + JavaScript file -->
    <script src="chart.umd.js"></script>

    <script src="app.js"></script>

</body>
</html>
